# ~/.config/tmux/tmux.conf
# ---------------------------------------------------------------------------
# Prefix: backtick (`) instead of Ctrl-b
# ---------------------------------------------------------------------------
unbind C-b
set -g prefix `
bind ` send-prefix
# Tap ` twice to send a literal backtick to the shell/app
bind ` send-prefix

# ---------------------------------------------------------------------------
# General usability
# ---------------------------------------------------------------------------
set -g mouse on                     # mouse: select panes/windows, resize, scroll, copy
set -g base-index 1                 # windows start at 1, not 0
setw -g pane-base-index 1           # panes start at 1, not 0
set -g renumber-windows on          # renumber windows when one is closed
set -g escape-time 0                # no delay after hitting Esc (fixes vim lag)
set -g history-limit 50000          # bigger scrollback
set -g focus-events on
set -g set-clipboard on
set -g allow-rename off             # don't let programs rename windows

# True color / terminal support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Reload config with prefix + r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux config reloaded"

# ---------------------------------------------------------------------------
# Panes & windows: intuitive splits, navigation, resizing
# ---------------------------------------------------------------------------
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"   # split vertically, keep cwd
bind - split-window -v -c "#{pane_current_path}"   # split horizontally, keep cwd
bind c new-window -c "#{pane_current_path}"        # new window keeps cwd

# vim-style pane navigation (h/j/k/l) — falls back to vim-tmux-navigator below
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# vim-style pane resizing (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# quick window switching
bind -r Tab last-window
bind -n M-Left previous-window
bind -n M-Right next-window

# ---------------------------------------------------------------------------
# Copy mode: vi keys + sane mouse/clipboard behavior
# ---------------------------------------------------------------------------
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel
# drag to select & copy with mouse
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-and-cancel

# ---------------------------------------------------------------------------
# Plugins (managed by TPM: prefix + I to install, prefix + U to update)
# ---------------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Catppuccin theme
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_date_time_text '%H:%M'

# Assemble the status bar from catppuccin modules (v2 API requires this explicitly)
set -g status-left-length 100
set -g status-right-length 100
set -g status-left "#{E:@catppuccin_status_session}"
set -g status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_date_time}"

# Session persistence: auto-save/restore
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @resurrect-capture-pane-contents 'on'

# Clipboard integration
set -g @plugin 'tmux-plugins/tmux-yank'

# Seamless navigation between tmux panes and vim/nvim splits
set -g @plugin 'christoomey/vim-tmux-navigator'

# System stats surfaced via Catppuccin's cpu/battery modules
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'

# Fuzzy-finder popup for sessions/windows/panes
set -g @plugin 'sainnhe/tmux-fzf'

# Mouse-free hint-based copying of paths/URLs/hashes from any pane
set -g @plugin 'laktak/extrakto'
set -g @extrakto_key 'e'

# Keybinding cheat-sheet popup
set -g @plugin 'alexwforsythe/tmux-which-key'

# General popup menu system for common actions
set -g @plugin 'jaclu/tmux-menus'

# File-manager sidebar: yazi in a toggleable side pane (mouse-friendly, unlike tmux-sidebar's static tree)
bind o run-shell '~/.config/tmux/scripts/toggle-yazi.sh'

# Initialize TPM (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'

# tmux-cpu/tmux-battery replace a literal "#{cpu_percentage}"-style placeholder
# with a live #() command, but only once, at the moment they run. Catppuccin's
# module only produces that placeholder text once flattened with -F, so we
# flatten (now that catppuccin has loaded above) then re-run cpu/battery's
# substitution pass against the flattened text.
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_battery}"
run-shell '~/.config/tmux/plugins/tmux-cpu/cpu.tmux'
run-shell '~/.config/tmux/plugins/tmux-battery/battery.tmux'
